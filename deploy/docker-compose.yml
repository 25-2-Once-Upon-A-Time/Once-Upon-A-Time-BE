version: "3.9"

services:
  api:
    build:
      context: ..
      dockerfile: Dockerfile.api
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      JOB_API_BASE_URL: http://api:8080
    depends_on:
      - api
