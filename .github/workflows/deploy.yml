name: Backend CI/CD

on:
  push:
    branches: ["develop"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      # 3. Build Spring Boot JAR
      - name: Build Spring Boot JAR
        run: ./gradlew clean build -x test

      # 4. Debug JAR list
      - name: Show built artifacts
        run: ls -l build/libs
  
      # 5. Upload ONLY bootJar to server (strip folders)
      - name: Upload Boot JAR to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          source: "build/libs/*SNAPSHOT.jar"
          target: "/home/t25301/backend/"
          strip_components: 2
  
      # 6. Restart Spring Boot on Server
      - name: Restart Spring Boot on Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          script: |
            cd /home/t25301/backend
            
            # Step 1: Load environment variables from .env file
            echo "Loading .env variables..."
            if [ -f .env ]; then
              set -o allexport
              source .env
              set +o allexport
              echo ".env loaded successfully"
            else
              echo "⚠️ Warning: .env file not found"
            fi
            
            # Step 2: Check if Spring Boot is already running
            echo "Checking for running Spring Boot process..."
            RUNNING_PID=$(pgrep -u t25301 -f "java -jar" || echo "")
            
            # Step 3: Stop existing process if found
            if [ -n "$RUNNING_PID" ]; then
              echo "Found running process (PID: $RUNNING_PID). Stopping..."
              kill $RUNNING_PID 2>/dev/null || true
              sleep 2
              echo "Previous process stopped"
            else
              echo "No previous process found (first deployment or already stopped)"
            fi
            
            # Step 4: Find the latest JAR file
            echo "Finding latest JAR..."
            LATEST_JAR=$(ls -t *SNAPSHOT.jar 2>/dev/null | head -n 1)
            
            if [ -z "$LATEST_JAR" ]; then
              echo "❌ ERROR: No JAR file found"
              ls -la
              exit 1
            fi
            
            echo "Using: $LATEST_JAR"
            
            # Step 5: Start new Spring Boot application
            echo "Starting Spring Boot..."
            nohup java -jar $LATEST_JAR > app.log 2>&1 &
            
            sleep 3
            
            # Step 6: Verify the application started successfully
            echo "Checking if process is running..."
            if pgrep -u t25301 -f "java -jar" > /dev/null; then
              echo "✅ SUCCESS: Spring Boot is running"
              ps -u t25301 | grep java
            else
              echo "❌ ERROR: Spring Boot did NOT start"
              echo "---- Last 50 lines of app.log ----"
              tail -n 50 app.log
              exit 1
            fi
