name: Backend CI/CD

on:
  push:
    branches: [ "develop" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-2
      ECR_AWS_ACCOUNT_ID: 563185858648
      ECR_REPOSITORY: ouat/worker
      ECR_IMAGE_TAG: latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Configure AWS credentials for ECR
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build and push Docker image
      - name: Build and push Docker image
        run: |
          IMAGE_URI="${ECR_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${ECR_IMAGE_TAG}"
          docker build -f Dockerfile.api -t "${IMAGE_URI}" .
          docker push "${IMAGE_URI}"

      # 5. Deploy on EC2
      - name: Deploy Docker container on EC2
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          envs: AWS_REGION,ECR_AWS_ACCOUNT_ID,ECR_REPOSITORY,ECR_IMAGE_TAG
          script: |
            IMAGE_URI="${ECR_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${ECR_IMAGE_TAG}"
            docker login -u AWS -p $(aws ecr get-login-password --region ${AWS_REGION}) ${ECR_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com
            docker pull "${IMAGE_URI}"

            docker stop ouat-api || true
            docker rm ouat-api || true

            docker run -d \
              --name ouat-api \
              --restart unless-stopped \
              --env-file /home/ubuntu/backend/.env \
              -p 8080:8080 \
              "${IMAGE_URI}"
