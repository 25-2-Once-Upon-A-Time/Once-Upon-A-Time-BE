name: Backend CI/CD

on:
  push:
    branches: ["develop"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      # 3. Build Spring Boot JAR
      - name: Build Spring Boot JAR
        run: ./gradlew clean build -x test

      # 4. Upload ONLY bootJar (exclude plain.jar)
      - name: Upload Boot JAR to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          source: "build/libs/*-SNAPSHOT.jar"
          target: "/home/t25301/backend/"

      # 5. Restart Spring Boot on Server
      - name: Restart Spring Boot on Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          script: |
            cd /home/t25301/backend

            echo "Stopping previous Spring Boot process..."
            pkill -u $USER -f "java -jar" || true

            echo "Starting new Spring Boot application..."
            LATEST_JAR=$(ls -t *SNAPSHOT.jar | head -n 1)

            nohup java -jar $LATEST_JAR > app.log 2>&1 &
            echo "Backend started with JAR: $LATEST_JAR"
