name: Backend CI/CD

on:
  push:
    branches: ["develop"]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2. JDK 17 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: 17

      # 3. Podman 설치
      - name: Install Podman
        run: |
          sudo apt-get update
          sudo apt-get install -y podman

      # 4. Docker Hub 로그인
      - name: Podman Login Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | podman login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin docker.io

      # 5. 이미지 빌드
      - name: Build Image with Podman
        run: podman build -t docker.io/${{ secrets.DOCKER_USERNAME }}/backend-app:latest -f src/Dockerfile .

      # 6. 이미지 Push
      - name: Push Image with Podman
        run: podman push docker.io/${{ secrets.DOCKER_USERNAME }}/backend-app:latest

      # 7. 서버 배포
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_PRIVATE_KEY }}
          script: |
            cd /home/t25301/backend
            podman-compose pull
            podman-compose down
            podman-compose up -d
