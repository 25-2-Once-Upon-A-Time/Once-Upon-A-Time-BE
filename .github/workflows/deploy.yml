name: Backend CI/CD

on:
  push:
    branches: [ "develop" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: ap-northeast-2
      ECR_AWS_ACCOUNT_ID: 563185858648
      ECR_API_REPOSITORY: ouat/api
      ECR_WORKER_REPOSITORY: ouat/worker
      ECR_IMAGE_TAG: latest
      ECR_WORKER_IMAGE_TAG: latest

    steps:
      # 1. Checkout
      - name: Checkout
        uses: actions/checkout@v3

      # 2. Configure AWS credentials for ECR
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      # 3. Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # 4. Build and push API Docker image
      - name: Build and push API Docker image
        run: |
          API_IMAGE_URI="${ECR_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_API_REPOSITORY}:${ECR_IMAGE_TAG}"
          docker build -f Dockerfile.api -t "${API_IMAGE_URI}" .
          docker push "${API_IMAGE_URI}"

      # 5. Build and push worker Docker image
      - name: Build and push worker Docker image
        run: |
          WORKER_IMAGE_URI="${ECR_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_WORKER_REPOSITORY}:${ECR_WORKER_IMAGE_TAG}"
          docker build -f worker/Dockerfile -t "${WORKER_IMAGE_URI}" worker
          docker push "${WORKER_IMAGE_URI}"

      # 6. Deploy on EC2 via SSM Run Command
      - name: Deploy Docker container on EC2 (SSM)
        run: |
          IMAGE_URI="${ECR_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_API_REPOSITORY}:${ECR_IMAGE_TAG}"
          COMMAND_ID=$(aws ssm send-command \
            --region "${AWS_REGION}" \
            --instance-ids "${{ secrets.SSM_INSTANCE_ID }}" \
            --document-name "AWS-RunShellScript" \
            --parameters commands="sudo docker login -u AWS -p \$(aws ecr get-login-password --region ${AWS_REGION}) ${ECR_AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com","sudo bash /home/ubuntu/backend/deploy/deploy-bluegreen.sh ${IMAGE_URI}" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM CommandId: ${COMMAND_ID}"
          echo "Waiting for command to finish..."

          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --region "${AWS_REGION}" \
              --command-id "${COMMAND_ID}" \
              --instance-id "${{ secrets.SSM_INSTANCE_ID }}" \
              --query "Status" \
              --output text || true)
            echo "Attempt ${i}: Status=${STATUS}"
            if [ "${STATUS}" = "Success" ] || [ "${STATUS}" = "Failed" ] || [ "${STATUS}" = "Cancelled" ] || [ "${STATUS}" = "TimedOut" ]; then
              break
            fi
            sleep 10
          done

          aws ssm get-command-invocation \
            --region "${AWS_REGION}" \
            --command-id "${COMMAND_ID}" \
            --instance-id "${{ secrets.SSM_INSTANCE_ID }}" \
            --query "[Status,StandardOutputContent,StandardErrorContent]" \
            --output text
